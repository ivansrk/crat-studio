# Установка: pipx install pre-commit && pre-commit install
# Каждый коммит проверяется на секреты (SEC-02). Обойти нельзя без --no-verify — не делать этого.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks
        args: ["--config", ".gitleaks.toml"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        exclude: ^content/ # yaml контента валидирует lib/content со своими правилами
      - id: end-of-file-fixer
      - id: trailing-whitespace
