questions:
  - question: "Почему вопрос «помоги с текстом» часто даёт слабый результат?"
    options:
      - "Нейросеть не умеет работать с текстами"
      - "В запросе не хватает деталей: про что текст, для кого и какой длины"
      - "Такие вопросы вообще запрещены"
    correct: 1
    explanation: "Чем меньше деталей в запросе, тем больше нейросети приходится додумывать самой — и тем выше шанс промахнуться мимо ожиданий."
  - question: "На какие три вопроса стоит ответить, формулируя хороший запрос?"
    options:
      - "Что нужно получить, для кого/для чего и в каком виде"
      - "Сколько это стоит, кто автор и когда было создано"
      - "Какой у нейросети размер и версия"
    correct: 0
    explanation: "Эти три ориентира помогают собрать запрос, по которому нейросеть может дать конкретный, а не общий ответ."
  - question: "Что делать, если запрос с первого раза сформулирован неидеально?"
    options:
      - "Считать задачу проваленной"
      - "Уточнить детали в следующем сообщении"
    correct: 1
    explanation: "Формулировать запросы — это навык, который приходит с практикой; уточнения после первого ответа — нормальная часть работы."
