questions:
  - question: "Как проверить, что приложение помощника настоящее, а не подделка?"
    options:
      - "Посмотреть на число отзывов: чем их больше, тем приложение точно надёжнее"
      - "Посмотреть разработчика: у Claude это Anthropic, у ChatGPT — OpenAI"
      - "Выбрать то приложение, которое стоит выше всех в результатах поиска"
    correct: 1
    explanation: "Имя разработчика — главная проверка; не то имя — это двойник."
  - question: "Почему в курсе именно два помощника, а не один и не десять?"
    options:
      - "Двоих хватает, чтобы сравнить и услышать второе мнение, а десять — каша"
      - "Два помощника вместе работают быстрее, чем один, и делят задачу пополам"
      - "Так требуют магазины приложений: меньше двух ставить у них не разрешают"
    correct: 0
    explanation: "Двое дают выбор и второе мнение, а десять — лишняя путаница для начала."
  - question: "Что из этого — тревожный признак поддельного приложения?"
    options:
      - "У него есть бесплатный вход и понятное имя настоящего разработчика"
      - "Оно предлагает войти привычной кнопкой «Продолжить с Google» без пароля"
      - "Оно просит банковскую карту ещё до того, как вы начали им пользоваться"
    correct: 2
    explanation: "Настоящие Claude и ChatGPT карту на старте не спрашивают — у обоих есть бесплатный вход."

deferred:
  - question: "Как удобнее всего войти в Claude и ChatGPT?"
    options:
      - "Придумать для каждого сервиса отдельный новый логин и отдельный пароль"
      - "Каждый раз заново вводить почту и пароль вручную, чтобы точно не сбиться"
      - "Нажать «Продолжить с Google» и выбрать свою почту — без нового пароля"
    correct: 2
    explanation: "Мастер-ключ из урока 1.2 открывает вход и сюда — в одно нажатие."
  - question: "Что даёт вам один аккаунт Google?"
    options:
      - "Вход во многие сервисы Google и в другие сайты — это ваш мастер-ключ"
      - "Только почту Gmail и больше ничего, для других сервисов нужны иные ключи"
      - "Готовые ответы ИИ без запроса, потому что аккаунт уже всё про вас знает"
    correct: 0
    explanation: "Один аккаунт открывает много дверей — в этом и смысл мастер-ключа."
  - question: "Как разумнее всего пользоваться двумя помощниками?"
    options:
      - "Раз и навсегда выбрать одного, а второй удалить, чтобы не путаться зря"
      - "Задать важный вопрос обоим и взять тот ответ, который лёг вам ближе"
      - "Отправлять половину запроса одному, а вторую половину — другому сразу"
    correct: 1
    explanation: "Два разных характера дают два взгляда на задачу — берите лучший."
