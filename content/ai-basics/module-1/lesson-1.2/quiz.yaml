questions:
  - question: "Почему аккаунт Google называют мастер-ключом?"
    options:
      - "Одним входом он открывает много сервисов Google и вход в другие сайты"
      - "Он единственный аккаунт, который вообще разрешено заводить в интернете"
      - "Он делает пароль ненужным, потому что вход везде становится бесплатным"
    correct: 0
    explanation: "Один ключ открывает много дверей — почту, хранилище, вход в Claude и тысячи сервисов."
  - question: "Как правильно хранить пароль от аккаунта Google?"
    options:
      - "Отправить его себе и близким в мессенджер, чтобы точно не потерялся"
      - "Держать в файле с названием «Пароли» на видном месте на рабочем столе"
      - "Записать в блокнот и заметку в телефоне, никому не пересылать в переписке"
    correct: 2
    explanation: "Пароль от мастер-ключа держат надёжно и не пересылают в мессенджерах."
  - question: "Что делать, если вы забыли пароль от Google?"
    options:
      - "Сразу завести новый аккаунт, а старый со всеми письмами просто оставить"
      - "Нажать «Забыли пароль?» и восстановить доступ через резервную почту или телефон"
      - "Написать пароль наугад несколько раз, пока сервис случайно не пропустит вас"
    correct: 1
    explanation: "Сначала восстанавливаем доступ — для этого и нужен запасной выход, а не второй аккаунт."

deferred:
  - question: "Что такое логин?"
    options:
      - "Секретное слово, которым вы открываете вход и никому его не называете"
      - "Кнопка, которая переносит все ваши файлы в хранилище на Google Диске"
      - "То, по чему сервис узнаёт, что это вы, — чаще всего это ваша почта"
    correct: 2
    explanation: "Логин можно называть, как адрес; секретное слово входа — это пароль."
  - question: "Чем ИИ отличается от обычного поиска в интернете?"
    options:
      - "ИИ показывает больше ссылок сразу и всегда находит их заметно быстрее"
      - "ИИ создаёт результат под вашу задачу, а поиск находит готовые чужие страницы"
      - "ИИ отвечает только по платной подписке, а поиск для всех остаётся бесплатным"
    correct: 1
    explanation: "Поиск даёт ссылки на существующее, ИИ делает новый результат под вашу ситуацию."
  - question: "Каким должен быть крепкий пароль?"
    options:
      - "Из трёх несвязанных слов и числа, которое помните только вы, — длинным"
      - "Из вашей даты рождения, чтобы его было легко вспомнить в любой момент"
      - "Из простой короткой комбинации вроде «123456», лишь бы быстро набрать"
    correct: 0
    explanation: "Длинный пароль из несвязанных слов и числа трудно угадать, но легко произнести."
