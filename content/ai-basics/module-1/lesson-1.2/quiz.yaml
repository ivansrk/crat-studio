questions:
  - question: "Нужно ли использовать специальные команды или код, чтобы начать диалог с ИИ?"
    options:
      - "Да, без них программа не поймёт вопрос"
      - "Нет, достаточно написать вопрос обычными словами"
    correct: 1
    explanation: "С нейросетью можно разговаривать обычным языком, как с человеком — специальные команды не нужны."
  - question: "Что делать, если ответ ИИ не устроил с первого раза?"
    options:
      - "Начинать новый диалог с чистого листа каждый раз"
      - "Уточнить или попросить переделать ответ в этом же диалоге"
      - "Считать, что ИИ не подходит для этой задачи"
    correct: 1
    explanation: "Диалог можно и нужно продолжать: попросить сократить, пояснить проще или добавить пример — ИИ подстроится под уточнение."
  - question: "Сколько попыток обычно даётся на вопрос к нейросети?"
    options:
      - "Только одна, как на экзамене"
      - "Сколько нужно — можно уточнять и переспрашивать"
    correct: 1
    explanation: "Диалог с ИИ похож на обычный разговор: можно переспрашивать и уточнять столько раз, сколько нужно для хорошего результата."
