questions:
  - question: "В чём смысл приёма «Переверни диалог»?"
    options:
      - "Задать один и тот же вопрос дважды, чтобы ответ получился заметно полнее"
      - "Написать запрос заглавными буквами, чтобы помощник понял его важность"
      - "Попросить помощника самого задать вам вопросы, если ему не хватает данных"
    correct: 2
    explanation: "Вы разрешаете стажёру вытянуть из вас нужное — и не мучаетесь над идеальным запросом."
  - question: "Первый ответ ИИ не подошёл. Что делать?"
    options:
      - "Уточнить прямо в том же диалоге: короче, проще, один пример — не начиная заново"
      - "Закрыть диалог и открыть новый, ведь испорченный ответ уже не переделать"
      - "Оставить как есть и переписать всё руками самому, раз помощник не справился"
    correct: 0
    explanation: "Помощник помнит всю беседу — просто скажите, что поправить, и он переделает."
  - question: "Из чего состоит формула хорошего запроса?"
    options:
      - "Из логина, пароля, резервной почты и номера телефона для входа в сервис"
      - "Роль, задача, контекст, формат, стиль и ограничения — шесть простых вещей"
      - "Из имени разработчика, официального сайта, отзывов и способа оплаты сервиса"
    correct: 1
    explanation: "Эти шесть слов и есть то, о чём помощник спрашивает вас в перевёрнутом диалоге."

deferred:
  - question: "Какую строчку добавляют к просьбе, чтобы «перевернуть диалог»?"
    options:
      - "«Отвечай как можно длиннее и подробнее, добавляй побольше разных деталей»"
      - "«Если информации не хватает, сначала задай мне вопросы — по одному»"
      - "«Напиши сразу три готовых варианта и выбери из них самый лучший сам»"
    correct: 1
    explanation: "Одна эта строчка заставляет помощника уточнять, а не угадывать."
  - question: "Как проверить, что приложение помощника настоящее?"
    options:
      - "Выбрать то, что стоит выше всех в поиске и набрало больше всего отзывов"
      - "Установить любое с нужным значком, а разобраться с этим уже потом в работе"
      - "Посмотреть разработчика: Anthropic у Claude и OpenAI у ChatGPT"
    correct: 2
    explanation: "Имя разработчика — главная проверка; не то имя — это двойник."
  - question: "Что ИИ не должен решать за вас в делах о здоровье, деньгах и документах?"
    options:
      - "Окончательное решение и диагноз — они остаются за специалистом и за вами"
      - "Список вопросов, которые стоит заранее задать врачу или юристу на приёме"
      - "Простое объяснение сложного документа, чтобы вы поняли его перед подписью"
    correct: 0
    explanation: "Помощник готовит и объясняет, но окончательное слово — за специалистом и за вами."
