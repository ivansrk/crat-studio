questions:
  - question: "Что такое нейросеть, если объяснять просто?"
    options:
      - "Робот, который думает как человек"
      - "Программа, обученная на большом количестве примеров, чтобы предлагать похожие ответы"
      - "База данных с готовыми ответами на все вопросы"
    correct: 1
    explanation: "Нейросеть не «думает» и не хранит готовые ответы — она обучена находить закономерности и предполагать наиболее вероятное продолжение."
  - question: "Можно ли полностью доверять первому ответу нейросети без проверки?"
    options:
      - "Да, она никогда не ошибается"
      - "Нет, к ответу стоит относиться как к черновику и при необходимости проверять факты"
    correct: 1
    explanation: "Нейросеть иногда ошибается, потому что предполагает продолжение, а не сверяется с реальностью — поэтому важные факты стоит перепроверять."
  - question: "На чём основаны ответы нейросети?"
    options:
      - "На случайном подборе слов"
      - "На огромном количестве текстов, картинок и других примеров, на которых её обучили"
      - "На личном мнении разработчиков в реальном времени"
    correct: 1
    explanation: "Нейросеть обучается заранее на большом массиве данных и после этого использует найденные в них закономерности для ответов."
