questions:
  - question: "Чем ИИ отличается от обычного поиска в интернете?"
    options:
      - "ИИ работает заметно быстрее поиска и показывает больше ссылок сразу"
      - "Поиск находит готовые чужие страницы, а ИИ создаёт результат под задачу"
      - "Поиск всегда бесплатный, а ИИ отвечает только по платной подписке"
    correct: 1
    explanation: "Поиск даёт ссылки на существующее, ИИ делает новый результат под вашу ситуацию."
  - question: "Почему ИИ в уроке сравнивают с начитанным стажёром?"
    options:
      - "Он ещё совсем молодой и потому часто ошибается в простых задачах"
      - "Он готов поработать бесплатно неделю, а затем обязательно просит оплату"
      - "Он прочитал всю библиотеку мира, но совсем ничего не знает про вас"
    correct: 2
    explanation: "Форму и знания даёт стажёр, а факты о вашей жизни добавляете только вы."
  - question: "Что не стоит передавать ИИ?"
    options:
      - "Пароли, коды из СМС, банковские данные и чужие личные документы"
      - "Просьбу написать вежливое письмо, поздравление или короткий план"
      - "Вопрос, где надо объяснить сложную тему простыми, понятными словами"
    correct: 0
    explanation: "ИИ — помощник со стороны; личные ключи и чужие данные ему не место, как паспорт незнакомцу."

deferred:
  - question: "Как получить от ИИ более точный ответ?"
    options:
      - "Повторить один и тот же короткий вопрос несколько раз подряд без правок"
      - "Написать запрос только заглавными буквами, чтобы он понял его важность"
      - "Подробно описать задачу: факты, нужный тон, для кого и что вы хотите"
    correct: 2
    explanation: "Чем точнее описание, тем лучше ответ — «слишком подробно» не бывает."
  - question: "Что делать с важными фактами в ответе ИИ — цифрами, датами, фамилиями?"
    options:
      - "Сразу переслать ответ дальше, ведь факты и числа ИИ не путает никогда"
      - "Проверить их самому, потому что ИИ иногда уверенно выдумывает неправду"
      - "Убрать их из ответа полностью, ведь ИИ совсем не умеет работать с числами"
    correct: 1
    explanation: "У выдумок ИИ гладкий вид; важное всегда сверяем сами."
  - question: "Что в курсе называют «запросом»?"
    options:
      - "То, что вы говорите или пишете ИИ, ставя перед ним свою задачу"
      - "Готовый текст, который ИИ вернул вам после обработки вашей просьбы"
      - "Кнопку микрофона, которой включают голосовой ввод прямо в поле ввода"
    correct: 0
    explanation: "Запрос — ваша задача для ИИ; то, что он вернул, называется ответом."
