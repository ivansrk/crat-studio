questions:
  - question: "Как делится работа при создании презентации?"
    options:
      - "а) Claude собирает смысл — структуру, тексты, речь; Google Презентации оформляют"
      - "б) Google Презентации придумывают тему и текст, а Claude только выбирает шрифты"
      - "в) Claude делает всё сам от начала до конца, а человеку остаётся только смотреть"
    correct: 0
    explanation: "Один думает и пишет, другой красиво раскладывает — как стажёр и вы."
  - question: "С чего правильно начинать презентацию у Claude?"
    options:
      - "а) Сразу просить полностью готовую презентацию со всеми текстами и картинками"
      - "б) Сначала попросить только структуру — названия слайдов и главную мысль каждого"
      - "в) Сначала выбрать красивый шаблон, а тему и содержание придумать потом по ходу"
    correct: 1
    explanation: "Начинаем со скелета, правим его, и только потом расписываем слайды."
  - question: "Куда кладут речь докладчика в Google Презентациях?"
    options:
      - "а) Прямо на слайд крупным шрифтом, чтобы зрители читали её вместе с вами"
      - "б) В отдельный документ, который открывают на другом устройстве во время речи"
      - "в) В поле заметок под слайдом — зрители его не видят, а вы во время речи видите"
    correct: 2
    explanation: "Заметки видны только выступающему — не страшно забыть, что сказать."
deferred:
  - question: "Главное правило хорошего слайда — это…"
    options:
      - "а) Один слайд — одна мысль; если не прочитать за 10 секунд, текста слишком много"
      - "б) Чем больше пунктов и цифр на слайде, тем солиднее и убедительнее презентация"
      - "в) На каждом слайде обязательно яркая картинка во весь экран и мелкий длинный текст"
    correct: 0
    explanation: "Мало текста на слайде, подробности — в речь докладчика."
  - question: "Claude написал в слайдах точные даты и фамилии. Что с ними делать?"
    options:
      - "а) Оставить как есть — в презентации ИИ ничего не путает, там он особенно точен"
      - "б) Проверить их самому: ИИ иногда уверенно выдумывает, важное всегда сверяем сами"
      - "в) Убрать все даты и фамилии со слайдов, ведь ИИ совсем не умеет работать с фактами"
    correct: 1
    explanation: "Даты, имена и цифры — самое опасное место; сверяем глазами сами."
  - question: "Что нужно сделать с материалом (отчётом, письмом), прежде чем дать его Claude?"
    options:
      - "а) Ничего убирать не нужно — можно смело загружать любые документы целиком"
      - "б) Перевести весь материал на английский язык, иначе Claude его не поймёт совсем"
      - "в) Убрать личные данные: чужие фамилии, паспорта, медицинские и банковские сведения"
    correct: 2
    explanation: "Стажёр — помощник со стороны; лишнего и чужого ему не показываем."
