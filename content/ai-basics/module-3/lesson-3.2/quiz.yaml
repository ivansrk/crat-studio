questions:
  - question: "Для каких бытовых задач можно использовать нейросеть?"
    options:
      - "Список покупок, план дня, маршрут прогулки"
      - "Только для рабочих отчётов"
      - "ИИ не подходит для бытовых задач"
    correct: 0
    explanation: "ИИ помогает и с повседневными делами — от списка покупок под конкретное меню до плана дня."
  - question: "Что нужно сделать, чтобы получить конкретный план, а не общий совет?"
    options:
      - "Описать свою ситуацию своими словами, с деталями"
      - "Задать вопрос максимально коротко, без подробностей"
    correct: 0
    explanation: "Чем конкретнее описана ситуация — дела, время, ограничения — тем более полезным будет план в ответ."
  - question: "Можно ли попросить нейросеть изменить готовый план дня?"
    options:
      - "Нет, план фиксирован сразу"
      - "Да, можно попросить сократить, добавить время на отдых или учесть новое дело"
    correct: 1
    explanation: "План — это отправная точка, которую можно и нужно донастраивать под реальные обстоятельства."
