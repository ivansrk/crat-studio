questions:
  - question: "Чем создание картинки в Nano Banana отличается от поиска картинок в интернете?"
    options:
      - "а) Nano Banana ищет готовые картинки быстрее и показывает их сразу без рекламы"
      - "б) Поиск находит чужие готовые картинки, а Nano Banana рисует новую под задачу"
      - "в) Поиск бесплатный всегда, а Nano Banana рисует картинки только по подписке"
    correct: 1
    explanation: "Как и с текстами, ИИ не находит чужое, а создаёт новое под вашу задачу."
  - question: "Почему на первой картинке советуют просить «без надписей»?"
    options:
      - "а) Буквы внутри картинки бывают с ошибкой — точный текст надёжнее добавить отдельно"
      - "б) Надписи на картинке всегда запрещены правилами, за них могут заблокировать вход"
      - "в) С надписью картинка рисуется намного дольше и расходует весь дневной лимит"
    correct: 0
    explanation: "Чистый фон сейчас, а имя и дату добавим отдельно в уроке 3.3."
  - question: "Что из этого делать нельзя?"
    options:
      - "а) Создать светлый цветочный фон для поздравительной открытки без людей"
      - "б) Попросить нарисовать спокойную иллюстрацию для поста о своём увлечении"
      - "в) Загрузить фото знакомого без спроса и переделать ему лицо и одежду"
    correct: 2
    explanation: "Чужие лица — только с согласия человека; это чужое лицо, а не ваше."
deferred:
  - question: "По какой формуле описывают картинку, чтобы она вышла как надо?"
    options:
      - "а) Что изображено, для чего, стиль, настроение, цвета, формат, чего быть не должно"
      - "б) Только цвет фона и размер картинки — остальное ИИ всегда додумывает правильно"
      - "в) Название нужного сайта и ссылка на похожую картинку, которую надо повторить"
    correct: 0
    explanation: "Семь пунктов формулы; чем точнее опишете — тем ближе результат."
  - question: "ИИ уверенно написал в ответе точную дату и фамилию. Что с ними делать?"
    options:
      - "а) Сразу разослать дальше — числа и фамилии ИИ никогда не путает и не выдумывает"
      - "б) Проверить самому: ИИ иногда уверенно выдумывает, важное всегда сверяем сами"
      - "в) Стереть их полностью из ответа, потому что ИИ совсем не умеет работать с фактами"
    correct: 1
    explanation: "У выдумок ИИ гладкий вид; цифру, дату, фамилию проверяем сами."
  - question: "Через что входят в Gemini, где рисует Nano Banana?"
    options:
      - "а) Через новый отдельный пароль, который надо специально придумать для картинок"
      - "б) Через номер телефона и код из СМС, каждый раз новый для каждой картинки"
      - "в) Через свой аккаунт Google — тот самый ключ от всех дверей, без нового пароля"
    correct: 2
    explanation: "Аккаунт Google открывает и Gemini — отдельную учётную запись заводить не нужно."
