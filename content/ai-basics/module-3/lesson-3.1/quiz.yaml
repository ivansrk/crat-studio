questions:
  - question: "Как нейросеть создаёт изображение?"
    options:
      - "По словесному описанию сюжета, настроения и стиля"
      - "Только копируя готовые чужие фотографии"
      - "Изображения создать нельзя, только текст"
    correct: 0
    explanation: "Достаточно описать словами, что должно быть на картинке, — нейросеть предложит изображение по этому описанию."
  - question: "Что стоит указать в описании, чтобы результат получился точнее?"
    options:
      - "Ничего, чем короче запрос, тем лучше"
      - "Что на переднем плане, какая атмосфера и в каком стиле нужна картинка"
    correct: 1
    explanation: "Подробности про сюжет, настроение и стиль помогают нейросети точнее понять, что вы хотите увидеть."
  - question: "Что делать, если картинка получилась не совсем такой, как хотелось?"
    options:
      - "Смириться с результатом"
      - "Попросить изменить конкретную деталь, не переписывая весь запрос заново"
    correct: 1
    explanation: "Можно уточнять и дорабатывать результат, указывая, что именно поменять, — как и в диалоге с текстом."
