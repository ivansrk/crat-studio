questions:
  - question: "Как можно использовать нейросеть при изучении новой темы?"
    options:
      - "Попросить объяснить простыми словами и привести пример"
      - "Нейросеть нельзя использовать для обучения"
      - "Только для проверки домашних заданий преподавателем"
    correct: 0
    explanation: "Нейросеть может объяснить тему заново, привести пример из жизни или предложить вопросы для самопроверки."
  - question: "Зачем стоит уточнять свой уровень знаний в запросе?"
    options:
      - "Чтобы объяснение соответствовало тому, что вы уже знаете"
      - "Это не имеет значения для ответа"
    correct: 0
    explanation: "Указание уровня («как для новичка» или «я уже знаком с темой») помогает получить объяснение нужной сложности."
  - question: "Заменяет ли обучение с ИИ книги и курсы?"
    options:
      - "Да, полностью заменяет"
      - "Нет, но хорошо дополняет их для быстрых уточнений"
    correct: 1
    explanation: "ИИ удобен, чтобы быстро прояснить одно непонятное место, но не заменяет системное обучение по книгам и курсам."
