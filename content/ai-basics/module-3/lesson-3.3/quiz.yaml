questions:
  - question: "Как делится работа при создании открытки?"
    options:
      - "а) Claude пишет текст поздравления, а Nano Banana рисует фон-картинку под него"
      - "б) Nano Banana придумывает и текст, и картинку, а Claude потом всё это проверяет"
      - "в) Claude рисует картинку и пишет текст, а Nano Banana выбирает шрифт и цвета фона"
    correct: 0
    explanation: "Один пишет слова, другой рисует фон — как в прошлых уроках модуля."
  - question: "Нужна открытка с точным именем и датой без ошибок. Как надёжнее сделать надпись?"
    options:
      - "а) Попросить Nano Banana написать имя и дату прямо внутри картинки и сразу отправить"
      - "б) Фон сделать без надписей, а имя и дату добавить поверх в Google Презентациях"
      - "в) Написать имя и дату отдельным сообщением под картинкой, а на самой картинке ничего"
    correct: 1
    explanation: "Текст, напечатанный вами поверх фона, ошибок не содержит."
  - question: "Без чего афиша не выполняет свою задачу?"
    options:
      - "а) Без яркого крупного рисунка во весь лист и без большого количества ярких цветов"
      - "б) Без длинного подробного текста, где расписаны все детали события до мелочей"
      - "в) Без даты и места — человек не поймёт, когда и куда ему приходить на событие"
    correct: 2
    explanation: "У афиши главное не красота, а ясность: что, когда, где, как участвовать."
deferred:
  - question: "Почему на картинке лучше просить фон «без надписей»?"
    options:
      - "а) Надписи на картинках запрещены, за них могут заблокировать доступ к сервису"
      - "б) Буквы внутри картинки бывают с ошибкой — точный текст надёжнее добавить сам"
      - "в) С надписью картинка рисуется дольше и тратит весь дневной бесплатный лимит"
    correct: 1
    explanation: "Фон — от ИИ, а точную надпись (имя, дату) добавляем сами."
  - question: "Что делать с текстом открытки перед тем, как отправить?"
    options:
      - "а) Отправить сразу — если текст написал ИИ, ошибок и опечаток там точно уже нет"
      - "б) Проверить самому имя, дату, место и попросить Claude вычитать на ошибки и ясность"
      - "в) Переписать весь текст от руки на бумаге, чтобы точно ничего случайно не потерять"
    correct: 1
    explanation: "ИИ иногда выдумывает и ошибается; важное сверяем сами, Claude вычитывает."
  - question: "Что из этого с помощью ИИ делать нельзя?"
    options:
      - "а) Сделать тёплую открытку коллеге и красивый пост о своей поездке для друзей"
      - "б) Собрать афишу своего мероприятия с настоящими датой, местом и своим текстом"
      - "в) Сделать приглашение якобы от чужой организации или картинку с чужим лицом без спроса"
    correct: 2
    explanation: "Подделки от чужого имени и чужие лица без согласия — под запретом."
