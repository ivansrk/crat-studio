questions:
  - question: "Почему в запрос о плане дня важно добавить слово «реалистичный»?"
    options:
      - "а) Иначе помощник ответит слишком медленно и придётся ждать готовый план дольше"
      - "б) Иначе помощник набьёт день под завязку и к обеду не останется ни капли сил"
      - "в) Иначе помощник напишет план заглавными буквами и его будет неудобно читать"
    correct: 1
    explanation: "Без этого слова план выходит без пауз; со словом «реалистичный» в нём остаётся воздух."
  - question: "Как быстро превратить кашу дел в голове в понятный порядок?"
    options:
      - "а) Выговорить всё помощнику и попросить разложить на «срочно, важно, можно позже»"
      - "б) Держать все дела в памяти и браться за то, что первым вспомнилось этим утром"
      - "в) Переписать список от руки несколько раз, пока порядок сам не сложится в голове"
    correct: 0
    explanation: "Помощник раскладывает хаос по полкам и делает чек-лист — видно, с чего начать."
  - question: "О чём помощника в теме здоровья просить нельзя?"
    options:
      - "а) Объяснить незнакомый медицинский термин простыми словами, понятными без подготовки"
      - "б) Составить список вопросов, которые стоит задать врачу на ближайшем приёме"
      - "в) Поставить диагноз или назначить лечение — это остаётся только за врачом"
    correct: 2
    explanation: "Помощник готовит и объясняет, но диагноз и лечение — только врач."
deferred:
  - question: "Какова роль помощника, когда он составляет вам план или список?"
    options:
      - "а) Он предлагает заготовку, а вы выбираете и подстраиваете её под свои силы и день"
      - "б) Он решает за вас, что делать и в каком порядке, чтобы снять с вас лишний груз"
      - "в) Он запоминает все ваши дела навсегда и сам напоминает о них в нужный момент"
    correct: 0
    explanation: "Помощник не знает ваших обстоятельств; его список — заготовка, которую вы правите."
  - question: "С чего разумнее начать пользоваться помощником в быту?"
    options:
      - "а) Сразу доверить ему все свои дела, чтобы поскорее привыкнуть ко всему и не тянуть"
      - "б) Взять две-три простые задачи и вернуться к сложному, когда они войдут в привычку"
      - "в) Дождаться, пока освоятся все знакомые, и только потом осторожно попробовать самому"
    correct: 1
    explanation: "Две-три задачи входят в привычку — дальше остальное потянется само, спешить некуда."
  - question: "(из урока 2.2) Что делает приём «Слабое место»?"
    options:
      - "а) Просит помощника найти в вашем плане дыры и то, что вы могли не учесть заранее"
      - "б) Просит написать план заглавными буквами, чтобы помощник отнёсся к нему серьёзно"
      - "в) Просит задать один и тот же вопрос дважды, чтобы разбор вышел полнее и подробнее"
    correct: 0
    explanation: "Второй взгляд помощника находит дыры до того, как что-то пойдёт не так."
