questions:
  - question: "В чём нейросеть особенно помогает при подготовке презентации?"
    options:
      - "В печати раздаточных материалов на принтере"
      - "В создании структуры: заголовков слайдов и тезисов к ним"
      - "В выборе места проведения выступления"
    correct: 1
    explanation: "Нейросеть помогает превратить общую тему в структуру из заголовков и тезисов — а дальше её можно редактировать под себя."
  - question: "Нужно ли использовать готовый план презентации от ИИ без изменений?"
    options:
      - "Да, менять ничего не нужно"
      - "Нет, план стоит доработать: что-то убрать, что-то добавить, вставить свои примеры"
    correct: 1
    explanation: "Готовый план — это отправная точка, а не финальный результат: его стоит адаптировать под свою ситуацию и аудиторию."
  - question: "Какой главный барьер помогает снять готовый план от нейросети?"
    options:
      - "Страх перед пустым первым слайдом"
      - "Необходимость покупать программу для презентаций"
      - "Отсутствие проектора в аудитории"
    correct: 0
    explanation: "Сложнее всего начать с чистого листа — готовая структура снимает именно эту преграду."
