questions:
  - question: "Нужно ли помнить формулы таблиц наизусть, чтобы работать с ИИ?"
    options:
      - "Да, без этого нейросеть не поймёт задачу"
      - "Нет, достаточно описать задачу словами"
    correct: 1
    explanation: "Нейросети можно просто описать, что нужно сделать с данными, а формулу или инструкцию она предложит сама."
  - question: "Для каких задач подходит связка «таблица + нейросеть»?"
    options:
      - "Только для сложных бухгалтерских отчётов"
      - "Для повседневных задач: семейный бюджет, списки покупок, простое расписание"
      - "Такая связка вообще не работает"
    correct: 1
    explanation: "Помощь ИИ с таблицами полезна и в простых бытовых задачах, не только в профессиональных расчётах."
  - question: "Что делать, если результат в таблице получился не тем, что ожидали?"
    options:
      - "Отказаться от идеи использовать таблицы"
      - "Показать нейросети, что не так, и попросить поправить конкретную часть"
    correct: 1
    explanation: "Уточнение и правка результата — обычная часть работы, так же как и в диалоге с текстом."
