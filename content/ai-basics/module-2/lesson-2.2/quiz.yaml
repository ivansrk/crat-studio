questions:
  - question: "В чём смысл приёма «Слабое место»?"
    options:
      - "а) Попросить помощника найти в вашем плане дыры и то, что вы могли не учесть"
      - "б) Написать план заглавными буквами, чтобы помощник отнёсся к нему серьёзнее"
      - "в) Задать один вопрос дважды, чтобы разбор получился заметно полнее и подробнее"
    correct: 0
    explanation: "Помощник читает ровно то, что написано, и не боится сказать неудобное — это репетиция перед реальным делом."
  - question: "Какова роль помощника при анализе ситуации?"
    options:
      - "а) Он принимает решение за вас, чтобы снять с вас лишнюю нагрузку и ответственность"
      - "б) Он показывает варианты, риски и вопросы — а выбор и вывод остаются за вами"
      - "в) Он собирает факты вашей жизни и хранит их, чтобы напоминать вам в нужный момент"
    correct: 1
    explanation: "Помощник помогает увидеть, но думает и отвечает за решение человек."
  - question: "Что делает универсальный запрос «Помоги разобраться»?"
    options:
      - "а) Пишет за вас готовое решение, которое остаётся только подписать и отправить дальше"
      - "б) Переводит вашу ситуацию на английский и обратно, чтобы взглянуть на неё со стороны"
      - "в) Раскладывает ситуацию по полкам: известно, непонятно, варианты, риски, шаги"
    correct: 2
    explanation: "Шесть полок превращают путаницу в понятный порядок, с которого легко начать."
deferred:
  - question: "Пришло длинное непонятное письмо. Как быстрее всего понять суть?"
    options:
      - "а) Прочитать его несколько раз подряд, пока смысл сам постепенно не сложится в голове"
      - "б) Попросить: «выдели, что от меня хотят, какие сроки и что нужно сделать дальше»"
      - "в) Переслать письмо коллеге и подождать, пока он прочитает и перескажет вам главное"
    correct: 1
    explanation: "Помощник вытащит суть за секунды — что хотят, сроки, следующие шаги."
  - question: "Нужно выбрать между двумя вариантами. Какой формат ответа удобнее всего?"
    options:
      - "а) Сплошной текст с рассуждением, где всё описано подряд в порядке важности мыслей"
      - "б) Один короткий вывод без объяснений, чтобы не тратить время на лишние подробности"
      - "в) Таблица: плюсы, минусы, риски, кому подходит — разница видна с одного взгляда"
    correct: 2
    explanation: "Таблица показывает различия нагляднее любого рассуждения."
  - question: "(из урока 2.1) Зачем в запрос добавляют «не добавляй ничего, чего я не сказал»?"
    options:
      - "а) Чтобы помощник не сочинил факты и детали, которых на самом деле не было в тексте"
      - "б) Чтобы помощник отвечал быстрее и не тратил ваше время на долгое ожидание ответа"
      - "в) Чтобы ответ получился заметно длиннее и подробнее, с большим числом красивых слов"
    correct: 0
    explanation: "Это ремень безопасности — он не даёт помощнику дописать то, чего вы не говорили."
