questions:
  - question: "Для чего удобно использовать нейросеть при работе с письмами?"
    options:
      - "Только для проверки орфографии"
      - "Для составления черновика, сокращения или, наоборот, расширения текста"
      - "Для автоматической отправки писем без проверки"
    correct: 1
    explanation: "Нейросеть хорошо помогает и с черновиком с нуля, и с сокращением длинного текста, и с более развёрнутой и вежливой формулировкой короткого сообщения."
  - question: "Нужно ли перечитывать письмо, составленное нейросетью, перед отправкой?"
    options:
      - "Нет, она никогда не ошибается в именах и цифрах"
      - "Да, обязательно — особенно имена, даты и цифры"
    correct: 1
    explanation: "Ответственность за отправленное письмо остаётся на человеке, а нейросеть иногда путает детали, поэтому проверка перед отправкой обязательна."
  - question: "Можно ли попросить нейросеть изменить тон письма — например, сделать его более официальным?"
    options:
      - "Да, достаточно попросить об этом словами"
      - "Нет, тон текста задаётся один раз и не меняется"
    correct: 0
    explanation: "Тон письма — обычная часть запроса: можно попросить официальный, дружелюбный или нейтральный вариант."
