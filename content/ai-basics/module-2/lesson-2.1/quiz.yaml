questions:
  - question: "Зачем в запрос добавляют строчку «не добавляй ничего, чего я не сказал»?"
    options:
      - "а) Чтобы помощник отвечал заметно быстрее и не тратил ваше время на ожидание"
      - "б) Чтобы помощник не сочинил факты и детали, которых на самом деле не было"
      - "в) Чтобы ответ получился длиннее и подробнее, с большим числом красивых слов"
    correct: 1
    explanation: "Это ремень безопасности — он не даёт помощнику красиво дописать то, чего вы не говорили."
  - question: "Первый вариант письма получился слишком сухим. Как лучше поступить?"
    options:
      - "а) Сказать в том же диалоге «сделай теплее» — помощник помнит беседу и переделает"
      - "б) Закрыть диалог и начать заново, ведь неудачный черновик уже не исправить толком"
      - "в) Оставить как есть и переписать весь текст руками, раз помощник не угадал с тоном"
    correct: 0
    explanation: "Первый ответ — черновик; назовите одно уточнение, и помощник поправит нужное."
  - question: "Куда удобно сложить готовый текст, чтобы он не потерялся?"
    options:
      - "а) В новый запрос помощнику, чтобы тот хранил его до следующего вашего вопроса"
      - "б) Никуда — важные письма надёжнее держать в голове и набирать заново каждый раз"
      - "в) В Google Документы: открываются с телефона и компьютера, сами сохраняются"
    correct: 2
    explanation: "Google Документы — бесплатная папка внутри вашего аккаунта; текст там не пропадёт и отправится ссылкой."
deferred:
  - question: "Как быстро получить несколько вариантов одного сообщения?"
    options:
      - "а) Задать один и тот же запрос трижды подряд и сравнить, что вернётся каждый раз"
      - "б) Попросить сразу: «дай три варианта — официальный, тёплый и совсем короткий»"
      - "в) Написать текст заглавными буквами, чтобы помощник понял, что нужно постараться"
    correct: 1
    explanation: "Одна просьба о нескольких вариантах экономит время — выбираете лучший или собираете своё."
  - question: "В письме есть номер паспорта участника. Что сделать перед загрузкой в помощника?"
    options:
      - "а) Заменить личные данные на метки вроде «[номер документа]» — помощник поможет со стилем"
      - "б) Загрузить как есть, помощник всё равно не запоминает и никому ничего не передаёт"
      - "в) Отказаться от помощника совсем: с любыми документами он не работает в принципе"
    correct: 0
    explanation: "Личные данные заменяем на метки, тогда помощник работает со структурой, а данные остаются у вас."
  - question: "(из урока 1.4) Что означает приём «Переверни диалог»?"
    options:
      - "а) Задать один и тот же вопрос дважды, чтобы ответ получился заметно полнее и точнее"
      - "б) Написать запрос заглавными буквами, чтобы помощник отнёсся к нему серьёзнее обычного"
      - "в) Попросить помощника самого задать вам вопросы, если ему не хватает данных для ответа"
    correct: 2
    explanation: "Вы разрешаете помощнику вытянуть из вас нужное — и не мучаетесь над идеальным запросом."
