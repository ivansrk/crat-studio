questions:
  - question: "Нужно ли сразу начать использовать все инструменты ИИ из курса?"
    options:
      - "Да, иначе курс пройден зря"
      - "Нет, полезнее закрепить несколько привычек, которые подходят именно вам"
    correct: 1
    explanation: "Гораздо ценнее выбрать несколько подходящих привычек и закрепить их, чем пытаться применить сразу всё."
  - question: "С чего полезно начать сборку личного набора инструментов?"
    options:
      - "С полного забвения пройденного материала"
      - "С воспоминания о двух-трёх моментах курса, которые оказались особенно полезными"
    correct: 1
    explanation: "Опора на собственный опыт — какие темы курса действительно пригодились — помогает выбрать, что развивать дальше."
  - question: "Что происходит после завершения курса?"
    options:
      - "Дальнейший результат зависит от практики"
      - "Все навыки автоматически сохраняются без дальнейших усилий"
    correct: 0
    explanation: "Курс даёт основу, а закрепление навыков ИИ, как и любых других, происходит через дальнейшую практику."
