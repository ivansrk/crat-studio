questions:
  - question: "Насколько приватна переписка в чате с нейросетью?"
    options:
      - "Абсолютно приватна, как личный дневник"
      - "Не полностью — текст может сохраняться или использоваться сервисом"
    correct: 1
    explanation: "Введённый текст может обрабатываться и сохраняться сервисом, поэтому не стоит считать переписку полностью приватной."
  - question: "Что из перечисленного не стоит отправлять в чат с ИИ?"
    options:
      - "Пароли, номера карт, паспортные данные"
      - "Вопрос о том, что приготовить на ужин"
      - "Просьбу объяснить незнакомое слово"
    correct: 0
    explanation: "Чувствительные личные данные — пароли, номера карт, документы — не стоит вводить в чат в открытом виде."
  - question: "Что сделать перед тем, как отправить в чат документ с чувствительными данными?"
    options:
      - "Отправить документ как есть"
      - "Убрать или заменить чувствительные места перед отправкой"
    correct: 1
    explanation: "Предварительное удаление или замена чувствительных сведений снижает риск, даже если документ нужно обработать нейросетью."
