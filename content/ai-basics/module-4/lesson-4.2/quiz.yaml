questions:
  - question: "Почему ИИ иногда уверенно выдаёт неправду?"
    options:
      - "а) Он специально путает пользователя, чтобы тот оформил платную подписку"
      - "б) Он не любит признавать «не знаю» и гладко достраивает недостающий факт"
      - "в) Он ломается от сложных вопросов и поэтому выдаёт совершенно пустой ответ"
    correct: 1
    explanation: "Он угадывает следующее слово гладко, а не «знает» факт; поэтому гладко не значит верно."
  - question: "Что из ответа ИИ обязательно проверяют?"
    options:
      - "а) Общие рассуждения и советы, где нет ни цифр, ни имён, ни дат, ни ссылок"
      - "б) Вежливые вступления и заключения, которыми ИИ обрамляет свой ответ"
      - "в) Цифры, даты, имена, ссылки на законы, цитаты — всё про здоровье и деньги"
    correct: 2
    explanation: "Выдумка прячется в «слишком точной» детали; общие рассуждения проверять не обязательно."
  - question: "Как обезличить вопрос про здоровье близкого человека?"
    options:
      - "а) Убрать фамилию и спросить в общем: что означают такие-то показатели"
      - "б) Написать полностью фамилию, возраст и диагноз, чтобы ответ был точнее"
      - "в) Совсем не спрашивать ИИ про здоровье — эта тема закрыта для помощника"
    correct: 0
    explanation: "Убираем всё, что указывает на человека; общий вопрос задать можно, диагноз всё равно ставит врач."
deferred:
  - question: "Самый надёжный способ проверить важный факт из ответа ИИ — это"
    options:
      - "а) перечитать ответ ещё раз внимательнее и убедиться, что он звучит гладко"
      - "б) сверить его с первоисточником: официальным сайтом или живым специалистом"
      - "в) попросить ИИ переписать тот же ответ покрасивее и подлиннее, с деталями"
    correct: 1
    explanation: "Можно спросить самого ИИ или второй инструмент, но последнее слово по важному — за первоисточником."
  - question: "Что из этого нельзя передавать ИИ?"
    options:
      - "а) Просьбу объяснить незнакомое слово из медицинской выписки простыми словами"
      - "б) Пароли, коды из СМС, номера карт и чужие документы с настоящими фамилиями"
      - "в) Обезличенный вопрос про рабочую ситуацию без имён и данных клиентов"
    correct: 1
    explanation: "Помощник со стороны — ключи и чужие данные ему не место, как паспорт незнакомцу."
  - question: "Из прошлых уроков: как защититься от поддельного голоса «родственника в беде»?"
    options:
      - "а) Внимательно вслушаться в голос и по интонации понять, настоящий он или нет"
      - "б) Быстро перевести деньги, пока родственник ждёт помощи, а разобраться потом"
      - "в) Сделать паузу, перезвонить самому на обычный номер и спросить кодовое слово"
    correct: 2
    explanation: "Ухо обмануть можно; спасают пауза, звонок по знакомому номеру и кодовое слово."
