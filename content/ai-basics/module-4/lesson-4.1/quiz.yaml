questions:
  - question: "Может ли нейросеть выдать неверный факт уверенным тоном?"
    options:
      - "Нет, уверенный тон гарантирует правильность"
      - "Да, уверенный тон не означает, что ответ достоверен"
    correct: 1
    explanation: "Нейросеть предлагает наиболее вероятное продолжение, а не проверенный факт — уверенная подача не гарантирует правды."
  - question: "С какими деталями стоит быть особенно осторожным в ответах ИИ?"
    options:
      - "С общими советами по хорошему настроению"
      - "С конкретными фактами: датами, именами, цифрами, ссылками на исследования"
    correct: 1
    explanation: "Именно конкретные факты легче всего перепутать, поэтому их стоит сверять с другим источником."
  - question: "Означает ли риск ошибки, что нейросети нельзя доверять вовсе?"
    options:
      - "Да, лучше вообще не пользоваться ИИ"
      - "Нет, достаточно перепроверять важные факты, а не отказываться от ИИ полностью"
    correct: 1
    explanation: "Проверка важных деталей занимает немного времени и позволяет пользоваться удобством ИИ без лишнего риска."
