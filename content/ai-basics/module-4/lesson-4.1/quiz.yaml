questions:
  - question: "Что надёжнее всего защищает от поддельного голоса или видео?"
    options:
      - "а) Внимательно вглядываться и вслушиваться, ища в подделке мелкие огрехи"
      - "б) Сделать паузу и проверить по второму каналу — перезвонить самому"
      - "в) Сразу выполнить просьбу, пока родственник ждёт помощи на другом конце"
    correct: 1
    explanation: "Глаз и ухо обмануть можно, а звонок по знакомому номеру — нет; вглядываться необязательно."
  - question: "По каким трём признакам почти всегда узнаётся мошенническая схема?"
    options:
      - "а) Незнакомый номер, плохая связь и звонок в очень позднее время суток"
      - "б) Вежливый тон, официальное обращение и просьба перезвонить попозже"
      - "в) Вас торопят, вас пугают и просят никому об этом не рассказывать"
    correct: 2
    explanation: "Срочно, страшно, по секрету — общая подпись любого обмана, знакомый там голос или нет."
  - question: "Зачем семье нужно кодовое слово?"
    options:
      - "а) Чтобы проверить, настоящий ли родной звонит: клон голоса слова не знает"
      - "б) Чтобы быстрее вспоминать пароли от банка, почты и других сервисов"
      - "в) Чтобы близкие могли открыть ваш телефон, если вы забыли свой пароль"
    correct: 0
    explanation: "Спросите «назови наше слово» — живой человек знает, поддельный голос нет."
deferred:
  - question: "Что нельзя делать, что бы ни говорил голос в трубке?"
    options:
      - "а) Класть трубку, чтобы спокойно перезвонить и перепроверить сообщение"
      - "б) Диктовать код из СМС и срочно переводить деньги по чужой просьбе"
      - "в) Задавать уточняющие вопросы и просить назвать ваше кодовое слово"
    correct: 1
    explanation: "Коды из СМС и срочные переводы — никогда; настоящий банк спешки не требует."
  - question: "Каким должно быть хорошее кодовое слово?"
    options:
      - "а) Дата рождения или кличка питомца — их легко вспомнить в нужный момент"
      - "б) Длинный набор из букв, цифр и знаков, как настоящий надёжный пароль"
      - "в) Простое слово, о котором договорились и нигде не записали на виду"
    correct: 2
    explanation: "День рождения и кличку можно подсмотреть; годится простое условленное слово."
  - question: "Из прошлых уроков: что не стоит передавать ИИ-помощнику?"
    options:
      - "а) Пароли, коды из СМС, банковские данные и чужие личные документы"
      - "б) Просьбу разобрать текст сообщения и подсказать признаки обмана в нём"
      - "в) Вопрос, как вежливо ответить на письмо или составить короткий план"
    correct: 0
    explanation: "ИИ — помощник со стороны; ключи и чужие данные ему не место, как паспорт незнакомцу."
