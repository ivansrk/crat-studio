questions:
  - question: "Демо-курс published: false — что это значит?"
    options:
      - "Курс доступен для прохождения всем"
      - "Курс показывается в каталоге как «Скоро» и недоступен для прохождения"
      - "Курс удалён"
    correct: 1
    explanation: "published: false — курс виден в каталоге как «Скоро», но недоступен для прохождения (MC-02)."
  - question: "Может ли lessonId «1.1» существовать одновременно в demo-course и ai-basics?"
    options:
      - "Нет, id уроков уникальны глобально"
      - "Да, lessonId уникален внутри курса, а не глобально"
    correct: 1
    explanation: "По контракту мультикурса lessonId уникален внутри курса (E-MC2) — одинаковые id в разных курсах не конфликтуют."
  - question: "Откуда платформа берёт список курсов?"
    options:
      - "Из базы данных"
      - "Из каталогов content/*, сканируемых lib/content"
      - "Из переменной окружения"
    correct: 1
    explanation: "MC-08: каталог курсов строится из content/ через lib/content, без хардкода в коде."
